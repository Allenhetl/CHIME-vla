# @package _global_
#
# M0 smoke — forward-only smoke test, single epoch, tiny batch.
# Goal: verify import + forward + Hydra wiring.  No real training.
#
# - hindsight disabled (γ̂ may not exist on disk yet)
# - lambda_1_target = 0 forces L_HCS contribution to 0 even if accidentally on
# - bs / T scaled down so a forward pass runs on a single GPU in seconds
#
# NOTE: this YAML must come *after* `data: libero_long` in the defaults list
# so that data.T_max here overrides libero_long.yaml (256).  The
# configs/default.yaml currently lists train BEFORE data — pass T_max on
# the CLI (`data.T_max=64`) to override, or move m0_smoke after data.

milestone: M0
experiment_name: m0_smoke

train:
  bs: 2
  max_epochs: 1
  grad_clip: 1.0
  warmup_steps: 0
  lr: 1.0e-4
  bptt_truncate: 32

data:
  T_max: 64

hindsight:
  enabled: false

loss:
  lambda_1_target: 0.0
  lambda_1_schedule: "off"
  lambda_2: 0.0
  lambda_3: 0.0
  lambda_4: 0.0
  lambda_ent: 0.0
